<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF9EAF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 外圈 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#g)" stroke-width="2.5" filter="url(#glow)" opacity="0.6"/>
  <!-- 内圈 -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.3"/>
  <!-- 代码符号 -->
  <text x="100" y="110" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="48" font-weight="bold" fill="url(#g)" filter="url(#glow)">&lt;/&gt;</text>
</svg>
